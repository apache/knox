<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>KnoxSSO - Sign In</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="shortcut icon" href="images/favicon.ico">
        <!-- Bootstrap 5.3.3 -->
        <link href="styles/bootstrap.min.css" media="all" rel="stylesheet" type="text/css" id="bootstrap-css">
        <!-- Bootstrap Icons 1.11.3 -->
        <link href="styles/bootstrap-icons.min.css" media="all" rel="stylesheet" type="text/css">
        <link href="styles/knox.css" media="all" rel="stylesheet" type="text/css" >

        <script src="libs/bower/jquery/js/jquery-3.5.1.min.js" ></script>
    <script type="text/javascript" src="js/knoxauth.js"></script>

        <!-- Knox Theme Configuration -->
        <script type="text/javascript" src="theme-config.js"></script>

        <!-- Knox Theme Loader (Inline & Blocking to prevent FOUC) -->
        <script type="text/javascript">
           (function() {
               // Load theme based on: deployment lock > URL parameter > localStorage > deployment default
               var urlParams = new URLSearchParams(window.location.search);
               var theme;

               // Check if theme is locked (admin-enforced theme)
               if (typeof KNOX_THEME_LOCKED !== 'undefined' && KNOX_THEME_LOCKED === true) {
                   // Theme is locked, use deployment default only
                   theme = KNOX_DEFAULT_THEME || 'default';
               } else {
                   // Normal mode: URL parameter > localStorage > deployment default
                   theme = urlParams.get('theme');

                   // If theme parameter exists, save to localStorage for persistence
                   if (theme) {
                       try {
                           localStorage.setItem('knox-auth-theme', theme);
                       } catch (e) {
                           // LocalStorage may be disabled, continue without saving
                       }
                   } else {
                       // Try to load from localStorage, fallback to deployment default
                       try {
                           theme = localStorage.getItem('knox-auth-theme') || KNOX_DEFAULT_THEME || 'default';
                       } catch (e) {
                           // LocalStorage may be disabled, use deployment default
                           theme = KNOX_DEFAULT_THEME || 'default';
                       }
                   }
               }

               // Load theme CSS if specified and not default
               // Use document.write to load synchronously and prevent FOUC
               if (theme && theme !== 'default') {
                   document.write('<link rel="stylesheet" type="text/css" href="styles/themes/' + theme + '/theme.css" id="knox-theme">');
               }
           })();
        </script>

        <script type="text/javascript">
           $(function() {
                var updateBoxPosition = function() {
                    $('#signin-container').css({
                        'margin-top' : ($(window).height() - $('#signin-container').height()) / 2
                    });
                };
                $(window).resize(updateBoxPosition);
                setTimeout(updateBoxPosition, 50);
            });
        </script>

    </head>
    <body class="login" style="">
        <!-- Page content
        ================================================== -->
        <section id="signin-container" style="margin-top: 4.5px;">
            <div class="l-logo">
                <img src="images/knox-logo.gif" alt="Knox logo">
            </div>
            <form action="" method="post" accept-charset="utf-8">
                <fieldset>
                    <div class="fields">
                        <label><i class="bi bi-person"></i> Username:</label>
                        <input type="text" name="username" id="username" tabindex="1" onkeypress=keypressed(event) autofocus>
                        <label><i class="bi bi-lock"></i> Password:</label>
                        <input type="password" name="password" id="password" tabindex="2" autocomplete="off" onkeypress=keypressed(event)>
                    </div>
                    <div id="errorBox" style="display:none;" role="alert">
                        <i class="bi bi-exclamation-triangle" aria-hidden="true"></i>
                        <span class="errorMsg"></span>
                    </div>
                    <button type="button" class="btn btn-primary w-100" id="signIn" tabindex="4" onkeypress="keypressed(event)" onclick="login();" style="position: relative; text-align: center;">
                        <span>Sign In</span>
                        <i id="signInLoading" class="bi bi-arrow-repeat icon-sign-in"></i>
                    </button>
                </fieldset>
            </form>
        </section>

    </body>
</html>

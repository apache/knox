<div class="resource-types-panel">
    <div class="resource-types-header">Resource Types</div>
    <ul class="resource-types-list">
        @for (type of resourceTypes; track type) {
            <li [class.selected]="type === selectedResourceType"
                (click)="onSelect(type)"
                class="clickable resource-type-item">
                {{type}}
            </li>
        }
    </ul>
</div>
